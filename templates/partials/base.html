<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artisana – Tableau de bord</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'assets/css/style.css'%}"/>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="brand">✦ Artisana</div>
    <div class="tagline">Gestion de boutique</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Principal</div>
  <a class="nav-link-item {% if request.resolver_match.url_name == 'dashboard_artisan' %}active{% endif %}"
   href="{% url 'artisan:dashboard_artisan' %}">
   <i class="bi bi-grid-1x2"></i> Tableau de bord
</a>

<a class="nav-link-item {% if request.resolver_match.url_name == 'add_product' %}active{% endif %}"
   href="{% url 'artisan:add_product' %}">
   <i class="bi bi-box-seam"></i> Produits
</a>

<a class="nav-link-item {% if request.resolver_match.url_name == 'orders' %}active{% endif %}"
   href="{% url 'artisan:orders' %}">
   <i class="bi bi-bag-check"></i> Commandes
</a>

<a class="nav-link-item {% if request.resolver_match.url_name == 'setup_artisan' %}active{% endif %}"
   href="{% url 'artisan:setup_artisan' %}">
   <i class="bi bi-gear"></i> Paramètres
</a>
<a class="nav-link-item"
   href="{% url 'userauths:logout_view' %}">
   <i class="bi bi-gear"></i> Déconnexion
</a>
</aside>
  {% block content %}

  {% endblock  %}



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
