<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artisana – Finaliser commande</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static '/assets/css/style_client.css' %}"/>
</head>
<body>


<div class="container my-5">
  <div class="mb-4 d-flex align-items-center gap-3">
    <a href="/" class="text-decoration-none text-muted fs-5"><i class="bi bi-arrow-left"></i></a>
    <h2 class="m-0">Annuler commande</h2>
  </div>

  <div class="card p-4">
    <h4 class="mb-3">Adresse de livraison</h4>
    {% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-3">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
{% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Prénom</label>
              {{form.first_name}}
        </div>
        <div class="col-md-6">
          <label class="form-label">Nom</label>
   {{form.last_name}}        </div>
        <div class="col-12">
          <label class="form-label">Adresse</label>
             {{form.adresse}}
        </div>
    
     
        <div class="col-12">
          <label class="form-label">Téléphone</label>
           {{form.phone}}
  


        </div>
      </div>

        </div>

      <button type="submit" class="btn btn-primary w-100 mt-4">
        <i class="bi bi-lock me-2"></i>Confirmer et payer — {{price}} MAD
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>
</html>
