<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artisana – Mes commandes</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    :root {
      --gold: #c6a75e;
      --charcoal: #1e1e1e;
      --soft-bg: #f8f6f0;
      --border: #e6e2d9;
    }

    body {
      background: #fdfcf9;
      font-family: 'Jost', sans-serif;
      color: var(--charcoal);
    }

    .page-header {
      background: white;
      padding: 60px 0 40px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 700;
    }

    .orders-container {
      padding: 60px 0;
    }

    .order-card {
      background: white;
      border-radius: 14px;
      padding: 25px;
      margin-bottom: 25px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .order-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.06);
    }

    .order-status {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-shipped {
      background: #cfe2ff;
      color: #084298;
    }

    .status-delivered {
      background: #d1e7dd;
      color: #0f5132;
    }

.status-cancelled {
  background: #f8d7da;
  color: #842029;
}

    .btn-view {
      background: var(--gold);
      color: white;
      border-radius: 8px;
      padding: 8px 18px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn-view:hover {
      background: #b8964e;
      color: white;
    }

    .empty-orders {
      text-align: center;
      padding: 80px 0;
      color: #6c757d;
    }
  </style>
</head>

<body>

<!-- Header -->
<section class="page-header">
  <div class="container">
    <h1 class="page-title">Mes commandes</h1>
    <p class="text-muted">Consultez l’historique et le statut de vos achats</p>
<a href="/" class="btn-view mt-3 d-inline-block">
  <i class="bi bi-house me-2"></i>Retour à l’accueil
</a>
  </div>
</section>

<!-- Orders -->
<section class="orders-container">
  <div class="container">

    <!-- Example Order 1 -->


    <!-- Example Order 2 -->

    {% for order in orders %}
    <div class="order-card d-flex justify-content-between align-items-center flex-wrap">
      <div>
        <h5 class="mb-1">Commande #{{order.id}}</h5>
        <small class="text-muted">{{order.created_at}}</small>
        <div class="mt-2">
          <span class="order-status status-{{order.status|lower}}">
            <i class="bi bi-check-circle me-1"></i>{{ order.get_status_display }}
          </span>
        </div>
      </div>
      <div class="text-end mt-3 mt-md-0">
        <h6 class="mb-2">Total : {{order.total_amount}} DH</h6>
   
      </div>
    </div>
{% endfor %}
    <!-- If no orders -->
    <!--
    <div class="empty-orders">
      <i class="bi bi-bag-x" style="font-size:50px;"></i>
      <h4 class="mt-3">Aucune commande trouvée</h4>
      <p>Vous n'avez pas encore effectué d'achat.</p>
      <a href="index.html" class="btn-view mt-3 d-inline-block">Commencer vos achats</a>
    </div>
    -->

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
