<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artisana – Commande confirmée</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    :root {
      --gold: #c6a75e;
      --charcoal: #1e1e1e;
      --soft-bg: #f9f7f2;
      --border: #e6e2d9;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #fdfcf9, #f5f2ea);
      font-family: 'Jost', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .success-card {
      background: #fff;
      padding: 60px 40px;
      border-radius: 18px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 90px;
      height: 90px;
      background: var(--soft-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin: 0 auto 25px;
      color: var(--gold);
      box-shadow: 0 10px 25px rgba(198,167,94,0.25);
    }

    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--charcoal);
      margin-bottom: 10px;
    }

    .success-sub {
      color: #6c757d;
      font-size: 15px;
      margin-bottom: 25px;
    }

    .success-ref {
      background: var(--soft-bg);
      padding: 10px 18px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 35px;
      border: 1px dashed var(--gold);
    }

    .btn-primary-cta {
      background: var(--gold);
      color: white;
      padding: 13px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-primary-cta:hover {
      background: #b8964e;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(198,167,94,0.4);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--charcoal);
      padding: 13px 28px;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-ghost:hover {
      background: var(--soft-bg);
      border-color: var(--gold);
      color: var(--gold);
    }

    @media (max-width: 576px) {
      .success-card {
        padding: 40px 25px;
      }
      .success-title {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="success-card">



    <div class="success-icon">
      <i class="bi bi-check-lg"></i>
    </div>

    <h2 class="success-title">Commande confirmée !</h2>

    <p class="success-sub">
      Merci pour votre achat. Votre commande a été transmise aux vendeurs et sera expédiée sous 24–48h.
    </p>

    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{% url 'client:Page_des_commandes_clients' %}" class="btn-primary-cta">
        <i class="bi bi-truck me-2"></i>Suivre ma commande
      </a>
      <a href="/" class="btn-ghost">
        Continuer mes achats
      </a>
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
