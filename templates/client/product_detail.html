
  {% extends "partials/base_client.html" %}
  
    {% block content %}

<style>
body{
  background:#f6f2ea !important;
}

.product-detail{
  padding:60px 0;
  background:#f6f2ea;
}

.breadcrumb-custom{
  font-size:14px;
  margin-bottom:25px;
  color:#6c757d;
}

.breadcrumb-custom a{
  text-decoration:none;
  color:#6c757d;
}

.breadcrumb-custom a:hover{
  text-decoration:underline;
}

.product-image-box{
  display:inline-block;      /* shrink to image size */
  border:1px solid #ddd;
  padding:15px;
  background:#ffffff;
}

.product-image-box img{
  max-width:320px;           /* control size */
  height:auto;
  display:block;
}

.product-title{
  font-size:28px;
  font-weight:600;
  margin-bottom:10px;
  color:#000;
}

.product-shop{
  font-size:14px;
  margin-bottom:15px;
  color:#555;
}

.product-price{
  font-size:26px;
  font-weight:600;
  color:#000;
  margin-bottom:15px;
}

.product-desc{
  font-size:15px;
  line-height:1.6;
  color:#444;
  margin-top:20px;
}

.action-buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:25px;
}

.btn-buy{
  background:#000;
  color:#fff;
  padding:10px 22px;
  border:none;
  border-radius:4px;
}

.btn-buy:hover{
  background:#333;
  color:#fff;
}

.btn-whatsapp{
  background:#25D366;
  color:#fff;
  padding:10px 22px;
  border:none;
  border-radius:4px;
}

.btn-whatsapp:hover{
  background:#1ebe5d;
  color:#fff;
}
</style>


<div class="product-detail container">

  <!-- Breadcrumb -->
  <div class="breadcrumb-custom">
    <a href="/">Accueil</a> ›
    <a href="#">{{ product.category }}</a> ›
    <span>{{ product.name }}</span>
  </div>

  <div class="row">

    <!-- Image -->
  <div class="col-md-5 mb-4 text-center">
      <div class="product-image-box">
        <img src="{{ product.product_image.url }}" alt="{{ product.name }}">
      </div>
    </div>

    <!-- Info -->
    <div class="col-md-6">

      <h1 class="product-title">{{ product.name }}</h1>

      <div class="product-shop">
        Vendu par <strong>{{ product.artisan.shop_name }}</strong>
      </div>

      <div class="product-price">
        {{ product.price }} MAD
      </div>

      <p class="product-desc">
        {{ product.description }}
      </p>

      <!-- Buttons -->
      <div class="action-buttons">
        <a href="{% url 'client:checkout' product.id %}" class="btn btn-danger">
          Acheter maintenant
        </a>

        <a href="https://wa.me/{{product.artisan.phone}}?text=Bonjour%20je%20suis%20intéressé%20par%20{{ product.name|urlencode }}"
           target="_blank"
           class="btn btn-whatsapp">
          <i class="bi bi-whatsapp"></i> WhatsApp
        </a>
      </div>

    </div>
  </div>
</div>





   {% endblock %}
