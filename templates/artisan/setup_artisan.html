{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Configuration de la Boutique</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #fdf6ec; /* crème doux */
        }

        .setup-card {
            background-color: #ffffff;
            border-radius: 20px;
        }

        .btn-primary {
            background-color: #c49a6c;
            border: none;
        }

        .btn-primary:hover {
            background-color: #b5895f;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow-lg p-4 setup-card">
        <h3 class="mb-4 text-center">Configuration de la Boutique</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nom de la boutique</label>
                {{ form.shop_name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Description de la boutique</label>
                {{ form.shop_description }}
            </div>

            <div class="mb-3">
                <label class="form-label">Numéro de téléphone</label>
                {{ form.phone }}
            </div>

            <div class="mb-3">
                <label class="form-label">Image de la boutique</label>
                {{ form.shop_image }}
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                Enregistrer et continuer
            </button>

        </form>
    </div>
</div>

</body>
</html>
