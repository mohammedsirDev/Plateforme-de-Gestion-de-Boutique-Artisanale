{% extends "partials/base.html" %}

{% block content %}
<div class="container mt-5" style="max-width:600px">

  <h3 class="mb-4">Modifier le produit</h3>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
      <label>Nom</label>
      {{ form.name }}
    </div>

    <div class="mb-3">
      <label>Description</label>
      {{ form.description }}
    </div>

    <div class="mb-3">
      <label>Prix</label>
      {{ form.price }}
    </div>

    <div class="mb-3">
      <label>Stock</label>
      {{ form.stock }}
    </div>
      <div class="mb-3">
      <label>Category</label>
      {{ form.category }}
    </div>


    <div class="mb-3">
      <label>Image</label>
      {{ form.product_image }}
    </div>

    <button class="btn btn-dark w-100">Mettre à jour</button>
  </form>

</div>
{% endblock %}
