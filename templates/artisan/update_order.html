{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier la commande</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f3e8; /* crème background */
        }

        .card {
            border-radius: 20px;
        }

        .card-header {
            background-color: #3e3e3e;
            border-radius: 20px 20px 0 0;
        }

        .btn-success {
            background-color: #5a7d5a;
            border: none;
        }

        .btn-success:hover {
            background-color: #4a6c4a;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-lg border-0">
                
                <div class="card-header text-white p-3">
                    <h4 class="mb-0">
                        <i class="bi bi-pencil-square me-2"></i>
                        Modifier la commande #{{ form.instance.id }}
                    </h4>
                </div>

                <div class="card-body p-4">

                    <form method="POST" action="">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Prénom</label>
                                {{ form.first_name }}
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nom</label>
                                {{ form.last_name }}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Adresse</label>
                            {{ form.adresse }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Téléphone</label>
                            {{ form.phone }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Statut de la commande</label>
                            {{ form.status }}
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'artisan:orders' %}" class="btn btn-outline-dark">
                                <i class="bi bi-arrow-left"></i> Retour
                            </a>

                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-check-circle me-1"></i>
                                Enregistrer
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>
</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
