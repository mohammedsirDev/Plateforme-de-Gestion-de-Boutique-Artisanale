<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artisana – Inscription</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="{% static 'assets/css/style_client.css' %}"/>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
  <a class="navbar-brand" href="/">✦ Artis<span>ana</span></a>
</nav>

<div class="container my-5">
  <div class="card p-4 mx-auto" style="max-width:600px">
    
    <h3 class="mb-4 text-center">Créer un compte</h3>

    <form method="POST">
      {% csrf_token %}

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Prénom</label>
          {{form.first_name}}
        </div>

        <div class="col-md-6">
          <label class="form-label">Nom</label>
            {{form.last_name}}
        </div>


        <div class="col-12">
          <label class="form-label">Email</label>
            {{form.email}}
        </div>

        <div class="col-12">
          <label class="form-label">Mot de passe</label>
            {{form.password1}}
        </div>

        <div class="col-12">
          <label class="form-label">Confirm Mot de passe</label>
           {{form.password2}}
        </div>
          <div class="col-12">
          <label class="form-label">Type d'utilisateur</label>
           {{form.user_types}}
        </div>

      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4">
        <i class="bi bi-person-check me-2"></i>S'inscrire
      </button>

      <div class="text-center mt-3">
        <small>
          Déjà un compte ?
          <a href="{% url 'userauths:login_view' %}">Se connecter</a>
        </small>
      </div>

    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
