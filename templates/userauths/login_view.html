<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artisana – Connexion</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="{% static 'assets/css/style_client.css' %}"/>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
  <a class="navbar-brand" href="/">✦ Artis<span>ana</span></a>

</nav>

<div class="container my-5">
  <div class="card p-4 mx-auto" style="max-width:600px">
 
    <h3 class="mb-4 text-center">Connexion</h3>

    <form method="POST">
      {% csrf_token %}

      <div class="row g-3">

        <div class="col-12">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" placeholder="email@example.com" required>
        </div>

        <div class="col-12">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-control" name="password" placeholder="••••••••" required>
        </div>

      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4">
        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
      </button>

      <div class="text-center mt-3">
        <small>
          Pas encore de compte ?
          <a href="{% url 'userauths:register' %}">S'inscrire</a>
        </small>
      </div>

    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
